# relay.openneo.org — run with: docker compose up -d
# Put a TLS-terminating reverse proxy (Caddy/Traefik/Cloudflare) in front for wss://.
# SPDX-License-Identifier: AGPL-3.0
services:
  relay:
    build: .
    image: openneo/ark-relay:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - relay-db:/usr/src/app/db
      - ./config.toml:/usr/src/app/config.toml:ro
    environment:
      RUST_LOG: info
    healthcheck:
      # The relay answers NIP-11 relay info on a GET with the right Accept header.
      test: ["CMD", "wget", "-qO-", "--header=Accept: application/nostr+json", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  relay-db:
